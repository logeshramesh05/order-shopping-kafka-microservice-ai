spring.application.name=${SPRING_APPLICATION_NAME:ares-service}
server.port=${SERVER_PORT:8083}

spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.url=${ARES_SPRING_DATASOURCE_URL:jdbc:h2:mem:ares;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

ares.observation.collection-interval-ms=${ARES_OBSERVATION_COLLECTION_INTERVAL_MS:30000}
ares.observation.kafka-bootstrap-servers=${ARES_OBSERVATION_KAFKA_BOOTSTRAP_SERVERS:${spring.kafka.bootstrap-servers}}
ares.observation.docker-enabled=${ARES_OBSERVATION_DOCKER_ENABLED:true}
ares.observation.actuator-timeout-ms=${ARES_OBSERVATION_ACTUATOR_TIMEOUT_MS:2000}
ares.observation.service-health-endpoints.order-service=${ARES_ORDER_ACTUATOR_HEALTH_URL:http://order-service:8081/actuator/health}
ares.observation.service-health-endpoints.shipping-service=${ARES_SHIPPING_ACTUATOR_HEALTH_URL:http://shipping-service:8082/actuator/health}

ares.intelligence.provider=${ARES_AI_PROVIDER:groq}
ares.intelligence.groq-base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1/chat/completions}
ares.intelligence.groq-model=${GROQ_MODEL:openai/gpt-oss-120b}
ares.intelligence.groq-api-key=${GROQ_API_KEY:}
ares.intelligence.timeout-ms=${ARES_INTELLIGENCE_TIMEOUT_MS:5000}
